name: QA

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  contracts-and-mocks:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install -e ".[test]"
      - run: python -m black --check src tests
      - run: python -m pytest -m "not portable and not source_mock and not ui and not abaqus_real" --junitxml=reports/junit.xml
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: qa-reports
          path: reports/
